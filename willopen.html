<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome:Feedback Portal</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>

    <div class="portal-wrapper">
        
        <header class="portal-header">
            <div class="logo-container">
                
                <img src="images/nyclogo.png" alt="Camp Logo" class="uni-logo">
                
            </div>
            <div class="logo-container">
                
                
                <img src="images/nysc.jpg" alt="Camp Logo" class="uni-logo">
            </div>
        </header>

        
        <section class="portal-banner">
            <div class="banner-content">
                <b><h1>The Feedback Portal will Open Soon! </h1></b>
            </div>
        </section>

        
        
    </div><br>
    <main class="portal-main">
            <div class="cards-container">
                
          
                
                
                <form id="loginForm" class="login-form">
                    <button type="submit" class="btn-login">Go Back</button>
                </form>
        </main>
    </div>

</body>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault(); 
        window.location.href = "feedback.html"; 
    });
</script>
</html>
