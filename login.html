<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    
    <div class="login-container">
        <div class="brand-section">
            <div class="brand-content">
                <div class="brand-sections">
                    <div class="brand-content">
                        <div class="logo-box">
                            <span class="logo-main"><span class="logo-sub"><b>WELCOME TO YOUTH CAMP</b></span></span>
                          
                        </div>
                        <h1><b>2026</b></h1>
                        <p class="subtitle"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-content">
                
                <div class="icon-container">
                    <img src="images/YouthCampLogo.jpeg" alt="Graduation Cap" class="grad-cap-image">
                </div>
                
                <h2>YOUTH CAMP PORTAL</h2>
                
                
                <form id="loginForm" class="login-form">
                    <button type="submit" class="btn-login">LOGIN</button>
                </form>
                
            </div>
        </div>
    </div>
</body>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault(); 
        window.location.href = "index.html"; 
    });
</script>
</html>
