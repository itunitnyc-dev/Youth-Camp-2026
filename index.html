<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome:Youth Camp Portal</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>

    <div class="portal-wrapper">
        
        <header class="portal-header">
            <div class="logo-container">
                
                <img src="images/nyclogo.png" alt="Camp Logo" class="uni-logo">
                
            </div>
            <div class="logo-container">
                
                
                <img src="images/nysc.jpg" alt="Camp Logo" class="uni-logo">
            </div>
        </header>

       
        <section class="portal-banner">
            <div class="banner-content">
                <b><h1>Welcome to Youth Camp 2026</h1></b>
            </div>
        </section>

        
        <main class="portal-main">
            <div class="cards-container">
                
               
                <a href="staff.html" class="portal-card student-card">
                    <div class="card-icon">
                        <svg class="avatar-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <span class="card-text">Staff login</span>
                </a>

                
                <a href="feedback.html" class="portal-card applicant-card">
                    <div class="card-icon">
                       
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
                         
                          <path d="M12 2L1 7l11 5 9-4.09V14a1 1 0 0 0 2 0V7.5L12 2z"/>
                          <path d="M4.14 11.51l6.86 3.12 6.86-3.12V17c0 .55-.45 1-1 1H5.14c-.55 0-1-.45-1-1v-5.49z"/>
                          <circle cx="18" cy="18" r="4" fill="#ff4d4d"/>
                          <path d="M18 16v2.5M18 19.5h.01" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span class="card-text">Feedback Form</span>
                </a>

            </div>
            <form id="loginForm" class="login-form">
                <button type="submit" class="btn-login">Go Back</button>
            </form>
        </main>
        
    </div>

</body>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault(); 
        window.location.href = "login.html"; 
    });
</script>
</html>
